  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  letter-spacing:-0.02em;\n  line-height:1.05;\n}\n.mono{\n  font-family:'JetBrains Mono',monospace;\n  text-transform:uppercase;\n  letter-spacing:0.1em;\n}\n\n/* ===== SECTION BACKGROUNDS ===== */\nsection{\n  background-color:#050505;\n  position:relative;\n  z-index:1;\n}\nsection.alt{background-color:#0A0A0A;}\nsection.surface{background-color:#0D0D0D;}\nfooter{position:relative;z-index:1;}\n\n/* ===== SHAFT LINE ===== */\n.shaft{\n  position:fixed;\n  left:64px;\n  top:0;bottom:0;\n  width:1px;\n  background:linear-gradient(to bottom, transparent 0%, rgba(16,185,129,0.15) 20%, rgba(16,185,129,0.15) 80%, transparent 100%);\n  pointer-events:none;\n  z-index:5;\n}\n\n/* ===== NAV ===== */\n.nav{\n  position:fixed;\n  top:0;left:0;right:0;\n  height:64px;\n  display:flex;\n  align-items:center;\n  justify-content:space-between;\n  padding:0 32px;\n  background:rgba(5,5,5,0);\n  border-bottom:1px solid transparent;\n  z-index:30;\n  transition:background 0.2s, border-color 0.2s, backdrop-filter 0.2s;\n}\n.nav.scrolled{\n  background:rgba(5,5,5,0.97);\n  backdrop-filter:blur(10px);\n  -webkit-backdrop-filter:blur(10px);\n  border-bottom:1px solid var(--border);\n}\n.nav-logo{height:36px;display:block;mix-blend-mode:screen;image-rendering:crisp-edges;}\n.nav-left{\n  display:flex;\n  align-items:center;\n  gap:14px;\n}\n.nav-brand{\n  font-family:'Archivo Black',sans-serif;\n  font-size:16px;\n  text-transform:uppercase;\n  letter-spacing:0.02em;\n  color:var(--text);\n  text-decoration:none;\n}\n.nav-tag{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  color:var(--muted);\n}\n.nav-right{\n  display:flex;\n  align-items:center;\n  gap:28px;\n}\n.nav-link{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  color:var(--muted);\n  text-decoration:none;\n  transition:color 0.15s;\n}\n.nav-link:hover{color:var(--text);}\n.nav-link.active{color:var(--green);}\n.nav-cta{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  color:var(--green);\n  text-decoration:none;\n  border:1px solid var(--green-deep);\n  padding:10px 14px;\n  margin-left:0;\n  transition:border-color 0.15s, color 0.15s;\n}\n.nav-cta:hover{border-color:var(--green);color:var(--green-glow);}\n\n/* ===== LED ===== */\n.led{\n  display:inline-block;\n  width:6px;\n  height:6px;\n  background:var(--green);\n  animation:pulse 2s infinite ease-in-out;\n  flex-shrink:0;\n}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}\n\n/* ===== TAGS ===== */\n.tag{\n  display:inline-flex;\n  align-items:center;\n  gap:8px;\n  border:1px solid var(--border);\n  padding:5px 10px;\n  font-family:'JetBrains Mono',monospace;\n  font-size:11px;\n  color:var(--muted);\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  line-height:1;\n}\n.tag.green{\n  border-color:var(--green-deep);\n  color:var(--green);\n  background:rgba(16,185,129,0.05);\n}\n\n/* ===== SECTIONS LAYOUT ===== */\nsection.std{\n  min-height:100vh;\n  padding:100px 120px 80px 120px;\n  display:flex;\n  flex-direction:column;\n  justify-content:center;\n}\nsection.compact{\n  padding:100px 120px;\n}\n.section-header{\n  margin-bottom:64px;\n  max-width:760px;\n}\n.section-tag{margin-bottom:24px;}\n.section-sub{\n  font-size:18px;\n  color:var(--muted);\n  max-width:560px;\n  line-height:1.75;\n  margin-top:24px;\n}\n\n/* ===== HERO ===== */\n.hero{\n  min-height:100vh;\n  padding:140px 120px 100px 120px;\n  display:flex;\n  flex-direction:column;\n  justify-content:center;\n  background-color:#050505;\n  position:relative;\n  overflow:hidden;\n}\n.scan-line{\n  position:absolute;\n  left:0;right:0;\n  height:1px;\n  background:linear-gradient(90deg, transparent 0%, rgba(16,185,129,0.4) 20%, rgba(16,185,129,0.4) 80%, transparent 100%);\n  animation:scan 9s linear infinite;\n  pointer-events:none;\n  z-index:1;\n}\n@keyframes scan{\n  0%{top:0%;opacity:0;}\n  5%{opacity:1;}\n  95%{opacity:1;}\n  100%{top:100%;opacity:0;}\n}\n.cursor{\n  color:#10B981;\n  animation:blink 1s step-end infinite;\n  font-size:0.8em;\n  margin-left:4px;\n  display:inline-block;\n}\n@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}\n\n.hero-status{\n  display:flex;\n  flex-wrap:wrap;\n  gap:12px;\n  margin-bottom:64px;\n  position:relative;\n  z-index:2;\n}\n.hero h1{\n  font-size:clamp(44px,6vw,72px);\n  max-width:820px;\n  margin-bottom:32px;\n  position:relative;\n  z-index:2;\n}\n.hero h1 .accent{color:var(--green);display:block;}\n.hero h1 span{display:block;}\n.hero-sub{\n  font-size:18px;\n  color:var(--muted);\n  max-width:540px;\n  line-height:1.75;\n  margin-bottom:24px;\n  position:relative;\n  z-index:2;\n}\n.hero-sub-2{\n  font-size:16px;\n  color:var(--muted);\n  max-width:540px;\n  line-height:1.75;\n  margin-bottom:48px;\n  position:relative;\n  z-index:2;\n}\n.cta-row{\n  display:flex;\n  align-items:center;\n  flex-wrap:wrap;\n  gap:24px;\n  position:relative;\n  z-index:2;\n}\n\n/* ===== BUTTONS ===== */\n.btn-primary{\n  background:var(--green);\n  color:var(--bg);\n  font-family:'JetBrains Mono',monospace;\n  font-size:13px;\n  font-weight:500;\n  text-transform:uppercase;\n  letter-spacing:0.08em;\n  padding:16px 28px;\n  border:none;\n  cursor:pointer;\n  text-decoration:none;\n  display:inline-block;\n  transition:background 0.15s;\n}\n.btn-primary:hover{background:var(--green-glow);}\n.cta-link{\n  font-family:'JetBrains Mono',monospace;\n  font-size:11px;\n  color:var(--muted);\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  text-decoration:none;\n  transition:color 0.15s;\n}\n.cta-link:hover{color:var(--text);}\n\n/* ===== METRICS ===== */\n.metrics{\n  display:grid;\n  grid-template-columns:repeat(4,1fr);\n  gap:1px;\n  background:#1A1A1A;\n  border:1px solid #1A1A1A;\n  margin-top:80px;\n  position:relative;\n  z-index:2;\n}\n.metric-cell{\n  background:#0D0D0D;\n  padding:32px 28px;\n  border-top:2px solid rgba(16,185,129,0.3);\n}\n.metric-num{\n  font-family:'Archivo Black',sans-serif;\n  font-size:clamp(36px,5vw,56px);\n  color:var(--green);\n  display:block;\n  line-height:1;\n  margin-bottom:10px;\n  letter-spacing:-0.02em;\n}\n.metric-label{\n  font-family:'JetBrains Mono',monospace;\n  font-size:11px;\n  color:#A0A09A;\n  text-transform:uppercase;\n  letter-spacing:0.1em;\n  line-height:1.6;\n}\n\n/* ===== CARDS ===== */\n.cards-3{\n  display:grid;\n  grid-template-columns:repeat(3,1fr);\n  gap:1px;\n  background:#1A1A1A;\n  border:1px solid #1A1A1A;\n}\n.cards-4{\n  display:grid;\n  grid-template-columns:repeat(4,1fr);\n  gap:1px;\n  background:#1A1A1A;\n  border:1px solid #1A1A1A;\n}\n.card{\n  background:var(--surface);\n  padding:40px 32px 52px 32px;\n  position:relative;\n  overflow:hidden;\n  transition:transform 0.2s ease, background 0.2s ease;\n}\n.card:hover{\n  transform:translateY(-2px);\n  background:#141414;\n}\n.card .accent-line{\n  position:absolute;\n  top:0;left:0;right:0;\n  height:3px;\n  background:var(--green);\n  z-index:1;\n}\n.card.red .accent-line{background:var(--red);}\n.card-icon{\n  position:relative;\n  z-index:1;\n  margin-bottom:16px;\n  display:block;\n}\n.card-tag{\n  position:relative;\n  z-index:1;\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  color:var(--muted);\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  margin-bottom:20px;\n  display:inline-flex;\n  align-items:center;\n  gap:8px;\n  border:1px solid var(--border);\n  padding:5px 10px;\n  line-height:1;\n}\n.card.red .card-tag{\n  border-color:rgba(239,68,68,0.3);\n  color:#EF4444;\n  opacity:0.85;\n}\n.card .card-tag.green{\n  border-color:var(--green-deep);\n  color:var(--green);\n  background:rgba(16,185,129,0.05);\n}\n.card h3{\n  position:relative;\n  z-index:1;\n  font-family:'Inter',sans-serif;\n  font-size:18px;\n  font-weight:600;\n  text-transform:none;\n  letter-spacing:0;\n  line-height:1.3;\n  margin-bottom:16px;\n  color:var(--text);\n}\n.card-body{\n  position:relative;\n  z-index:1;\n  font-size:14px;\n  color:var(--muted);\n  line-height:1.75;\n}\n.cards-4 .card{padding:40px 28px 52px 28px;}\n.cards-4 .card h3{font-size:17px;}\n.cards-4 .card-body{font-size:13px;}\n\n.card-bignum{\n  position:absolute;\n  bottom:-16px;\n  right:20px;\n  font-family:'Archivo Black',sans-serif;\n  font-size:120px;\n  line-height:1;\n  pointer-events:none;\n  user-select:none;\n  letter-spacing:-0.04em;\n  z-index:0;\n}\n.card.red .card-bignum{color:rgba(239,68,68,0.045);}\n.cards-4 .card .card-bignum{color:rgba(16,185,129,0.04);}\n.cards-3.green .card .card-bignum{color:rgba(16,185,129,0.04);}\n\n/* ===== COMPARISON ===== */\n.compare{\n  display:grid !important;\n  grid-template-columns:1fr 1fr !important;\n  gap:1px !important;\n  background:#1A1A1A !important;\n  border:1px solid #1A1A1A;\n  max-width:1000px;\n}\n.compare-col{position:relative;}\n.compare-col.left{background:#050505;}\n.compare-col.right{background:#091A11 !important;}\n.compare-col.right::before{\n  content:\"\";\n  position:absolute;\n  top:0;left:0;right:0;\n  height:3px;\n  background:#10B981 !important;\n}\n.compare-head{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n  padding:20px 32px 16px;\n}\n.compare-col.left .compare-head{color:#555550 !important;}\n.compare-col.right .compare-head{color:#10B981 !important;}\n.compare-row{\n  padding:18px 32px;\n  font-size:14px;\n  line-height:1.6;\n  display:flex;\n  align-items:flex-start;\n  gap:12px;\n  min-height:84px;\n}\n.compare-col.left .compare-row{\n  color:#6B6B65 !important;\n  border-bottom:1px solid #0D0D0D;\n}\n.compare-col.left .compare-row span{color:#6B6B65 !important;}\n.compare-col.right .compare-row{\n  color:#F0F0EB !important;\n  border-bottom:1px solid #0F2010;\n}\n.compare-col.right .compare-row span{color:#F0F0EB !important;}\n\n/* ===== 2x2 ===== */\n.cards-2x2{\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:1px;\n  background:#1A1A1A;\n  border:1px solid #1A1A1A;\n  max-width:1100px;\n}\n.cards-2x2 .card{padding:36px 32px;}\n.cards-2x2 .card::after{\n  content:\"\";\n  position:absolute;\n  bottom:0;left:0;\n  width:40px;\n  height:2px;\n  background:var(--green);\n}\n.cards-2x2 .card .accent-line{display:none;}\n.cards-2x2 .card h3{font-size:16px;}\n.cards-2x2 .card-body{font-size:13px;}\n.industry-icon{display:block;margin-bottom:20px;}\n\n/* ===== AI COMPARE ===== */\n.ai-compare{margin-top:48px;max-width:860px;}\n.ai-compare-inner{display:grid;grid-template-columns:1fr auto 1fr;gap:1px;background:#1A1A1A;}\n.ai-state{padding:32px 28px;display:flex;flex-direction:column;align-items:flex-start;gap:0;}\n.ai-state--bad{background:#0A0A0A;}\n.ai-state--good{background:#071510;border-top:2px solid #10B981;}\n.ai-state-label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:20px;display:flex;align-items:center;}\n.ai-state--bad .ai-state-label{color:#EF4444;opacity:0.7;}\n.ai-state--good .ai-state-label{color:#10B981;}\n.ai-inputs{display:flex;flex-direction:column;gap:6px;width:100%;margin-bottom:16px;}\n.ai-input{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;text-transform:lowercase;opacity:0;transform:translateX(-8px);transition:opacity 0.3s ease,transform 0.3s ease;}\n.ai-input.bad{background:rgba(239,68,68,0.06);border-left:2px solid rgba(239,68,68,0.25);color:#8A4040;}\n.ai-input.good{background:rgba(16,185,129,0.07);border-left:2px solid rgba(16,185,129,0.3);color:#5A9A7A;transform:translateX(8px);}\n.ai-compare.visible .ai-input{opacity:1;transform:translateX(0);}\n.ai-compare.visible .ai-input:nth-child(1){transition-delay:0.1s;}\n.ai-compare.visible .ai-input:nth-child(2){transition-delay:0.25s;}\n.ai-compare.visible .ai-input:nth-child(3){transition-delay:0.4s;}\n.ai-compare.visible .ai-input:nth-child(4){transition-delay:0.55s;}\n.ai-arrow{font-family:'JetBrains Mono',monospace;font-size:18px;color:#2A2A2A;margin:8px 0;align-self:center;}\n.ai-arrow.good{color:rgba(16,185,129,0.4);}\n.ai-box{font-family:'Archivo Black',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:0.15em;padding:10px 24px;align-self:center;margin:4px 0;}\n.ai-box--bad{border:1px solid #2A2A2A;color:#3A3A35;}\n.ai-box--good{border:1px solid #10B981;color:#10B981;background:rgba(16,185,129,0.05);}\n.ai-output{font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;margin-top:8px;padding:12px 14px;}\n.ai-output.bad{color:#4A4A45;border-left:2px solid #2A2A2A;}\n.ai-output.good{color:#C8E8D8;border-left:2px solid #10B981;background:rgba(16,185,129,0.04);}\n.ai-divider-vs{display:flex;align-items:center;justify-content:center;background:#050505;padding:0 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#2A2A2A;letter-spacing:0.15em;writing-mode:vertical-rl;}\n\n/* ===== AI FOUNDATION ===== */\n.ai-foundation{\n  position:relative;\n  padding:120px 120px;\n  background:#050505;\n  border-top:1px solid #1A1A1A;\n  border-bottom:1px solid #1A1A1A;\n  overflow:hidden;\n}\n.ai-foundation::before{\n  content:\"\";\n  position:absolute;\n  left:0;top:0;bottom:0;\n  width:3px;\n  background:var(--green);\n  z-index:1;\n}\n.ai-bg-text{\n  position:absolute;\n  top:50%;left:50%;\n  transform:translate(-50%,-50%);\n  font-family:'Archivo Black',sans-serif;\n  font-size:clamp(80px,12vw,160px);\n  color:rgba(16,185,129,0.03);\n  white-space:nowrap;\n  pointer-events:none;\n  user-select:none;\n  letter-spacing:-0.02em;\n  text-transform:uppercase;\n  z-index:0;\n}\n.ai-content{position:relative;z-index:2;max-width:800px;}\n.ai-label{\n  font-family:'JetBrains Mono',monospace;\n  font-size:11px;\n  color:var(--green);\n  letter-spacing:0.15em;\n  text-transform:uppercase;\n  margin-bottom:32px;\n  display:block;\n}\n.ai-foundation h2{\n  font-size:clamp(36px,5vw,60px);\n  line-height:1.05;\n  margin-bottom:32px;\n  max-width:780px;\n}\n.ai-p1{\n  font-size:18px;\n  color:var(--text);\n  max-width:680px;\n  line-height:1.75;\n  margin-bottom:20px;\n}\n.ai-p2{\n  font-size:18px;\n  color:var(--muted);\n  max-width:680px;\n  line-height:1.75;\n  margin-bottom:48px;\n}\n.ai-stats{\n  display:flex;\n  gap:48px;\n  align-items:center;\n  flex-wrap:wrap;\n}\n.ai-stat-num{\n  font-family:'Archivo Black',sans-serif;\n  font-size:32px;\n  color:var(--green);\n  letter-spacing:-0.02em;\n  line-height:1;\n  margin-bottom:8px;\n}\n.ai-stat-label{\n  font-family:'JetBrains Mono',monospace;\n  font-size:10px;\n  color:var(--muted);\n  text-transform:uppercase;\n  letter-spacing:0.12em;\n}\n.ai-divider{\n  width:1px;\n  height:40px;\n  background:#1A1A1A;\n}\n\n/* ===== WAITLIST ===== */\n.waitlist-grid{\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:80px;\n  align-items:start;\n}\n.waitlist-left .tag{margin-bottom:24px;}\n.waitlist-left h2{\n  font-size:clamp(32px,3.6vw,48px);\n  line-height:1.1;\n  margin-bottom:16px;\n}\n.waitlist-body{\n  font-size:16px;\n  color:var(--muted);\n  line-height:1.75;\n  margin-bottom:32px;\n  max-width:520px;\n}\n.price-block{\n  border-left:3px solid var(--green);\n  padding:16px 20px;\n  background:rgba(16,185,129,0.05);\n  margin-bottom:40px;\n  font-size:16px;\n  color:var(--text);\n  line-height:1.6;\n  max-width:520px;\n}\n.trust-bullet{\n  display:flex;\n  align-items:flex-start;\n  gap:12px;\n  margin-bottom:16px;\n  font-size:14px;\n  color:var(--muted);\n  line-height:1.5;\n}\n.contact-line{\n  font-size:13px;\n  color:var(--muted);\n  margin-top:32px;\n}\n.contact-line a{\n  color:var(--green);\n  text-decoration:none;\n}\n.contact-line a:hover{color:var(--green-glow);}\n\n.form-wrap{\n  background:#050505;\n  border:1px solid var(--border);\n  padding:0;\n}\n.form{\n  display:flex;\n  flex-direction:column;\n}\n.field{\n  background:var(--surface);\n  display:flex;\n  flex-dir class=\"nav-right\">\n    <a href=\"#problem\" class=\"nav-link\" data-section=\"problem\">Problem<\u002Fa>\n    <a href=\"#how\" class=\"nav-link\" data-section=\"how\">Jak działa<\u002Fa>\n    <a href=\"#forwhom\" class=\"nav-link\" data-section=\"forwhom\">Dla kogo<\u002Fa>\n    <a href=\"#waitlist\" class=\"nav-cta\">[ Dołącz do pilotu ]<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<aside class=\"depth\" aria-hidden=\"true\">\n  <a href=\"#hero\" data-section=\"hero\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">HERO<\u002Fspan><\u002Fa>\n  <a href=\"#problem\" data-section=\"problem\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">PROBLEM<\u002Fspan><\u002Fa>\n  <a href=\"#how\" data-section=\"how\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">ROZWIĄZANIE<\u002Fspan><\u002Fa>\n  <a href=\"#difference\" data-section=\"difference\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">RÓŻNICA<\u002Fspan><\u002Fa>\n  <a href=\"#grows\" data-section=\"grows\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">ROŚNIE<\u002Fspan><\u002Fa>\n  <a href=\"#forwhom\" data-section=\"forwhom\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">DLA KOGO<\u002Fspan><\u002Fa>\n  <a href=\"#waitlist\" data-section=\"waitlist\"><span class=\"depth-dot\"><\u002Fspan><span class=\"depth-label\">PILOT<\u002Fspan><\u002Fa>\n<\u002Faside>\n\n<!-- HERO -->\n<section id=\"hero\" class=\"hero fade-in\" data-screen-label=\"01 Hero\">\n  <div class=\"scan-line\"><\u002Fdiv>\n  <div class=\"hero-status\">\n    <span class=\"tag green\"><span class=\"led\"><\u002Fspan>System aktywny<\u002Fspan>\n    <span class=\"tag\">Pilot — ograniczona liczba miejsc<\u002Fspan>\n  <\u002Fdiv>\n  <h1>\n    <span>TWOJA FIRMA WIE<\u002Fspan>\n    <span>WIĘCEJ NIŻ MYŚLISZ.<\u002Fspan>\n    <span class=\"accent\">PROBLEM W TYM,<\u002Fspan>\n    <span>ŻE NIKT NIE MOŻE<\u002Fspan>\n    <span>TEGO ZNALEŹĆ.<span class=\"cursor\">█<\u002Fspan><\u002Fspan>\n  <\u002Fh1>\n  <p class=\"hero-sub\">Compilore to nowoczesna baza wiedzy nowej generacji — napędzana przez AI, zaprojektowana dla polskiego B2B. Wgrywasz dokumenty, zadajesz pytania, dostajesz precyzyjne odpowiedzi ze wskazaniem źródła. W 30 sekund.<\u002Fp>\n  <p class=\"hero-sub-2\">Koniec z szukaniem w folderach. Koniec z „sprawdzę i oddzwonię\". Koniec z wiedzą zamkniętą w głowach ludzi. Twoja firma działa na najnowszych technologiach — efektywnie, natychmiastowo, z pełną kontrolą.<\u002Fp>\n  <div class=\"cta-row\">\n    <a href=\"#waitlist\" class=\"btn-primary\">[ Chcę zobaczyć jak to działa → ]<\u002Fa>\n    <a href=\"https://app.compilore.pl\" class=\"cta-link\">app.compilore.pl ↗<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"metrics\" id=\"metrics\">\n    <div class=\"metric-cell\">\n      <div class=\"metric-num\" data-target=\"11\" data-suffix=\" tygodni\">0 tygodni<\u002Fdiv>\n      <div class=\"metric-label\">PRACY ROCZNIE TRACONE NA SZUKANIE / NA DORADCĘ<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric-cell\">\n      <div class=\"metric-num\" data-target=\"18\" data-suffix=\" min\">0 min<\u002Fdiv>\n      <div class=\"metric-label\">ŚREDNI CZAS JEDNEGO WYSZUKIWANIA W DOKUMENTACH<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric-cell\">\n      <div class=\"metric-num\" data-target=\"30\" data-suffix=\" s\">0 s<\u002Fdiv>\n      <div class=\"metric-label\">CZAS ODPOWIEDZI W COMPILORE — ZE WSKAZANIEM ŹRÓDŁA<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric-cell\">\n      <div class=\"metric-num\" data-target=\"1\" data-suffix=\" dzień\">0 dzień<\u002Fdiv>\n      <div class=\"metric-label\">CZAS WDROŻENIA — OD PIERWSZEGO DOKUMENTU DO PIERWSZEJ ODPOWIEDZI<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM -->\n<section id=\"problem\" class=\"std fade-in\" data-screen-label=\"02 Problem\">\n  <div class=\"section-header\">\n    <span class=\"tag section-tag\">[ Problem ]<\u002Fspan>\n    <h2 style=\"font-size:clamp(32px,4.4vw,56px);max-width:700px;\">TWÓJ NAJLEPSZY<br>HANDLOWIEC<br>NIE SPRZEDAJE.<br>SZUKA.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"cards-3\">\n    <article class=\"card red\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.6\"><path d=\"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63 19.79 19.79 0 01.22 2.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z\"><\u002Fpath><\u002Fsvg>\n      <span class=\"card-tag\">[ SYTUACJA 01 ]<\u002Fspan>\n      <h3>Sprawdzę i oddzwonię<\u002Fh3>\n      <p class=\"card-body\">Klient czeka. Handlowiec przeszukuje trzy katalogi i dwa foldery na serwerze. Zanim znajdzie odpowiedź — klient zamawia u konkurencji.<\u002Fp>\n      <div class=\"card-bignum\">01<\u002Fdiv>\n    <\u002Farticle>\n    <article class=\"card red\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.6\"><path d=\"M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n      <span class=\"card-tag\">[ SYTUACJA 02 ]<\u002Fspan>\n      <h3>Nowy pracownik, ten sam problem<\u002Fh3>\n      <p class=\"card-body\">Nowy człowiek potrzebuje miesięcy żeby ogarnąć wiedzę produktową. Przez cały ten czas ciągnie za rękę doświadczonego doradcę — który przez to nie może robić swojej pracy. Koszt niewidoczny, ale realny.<\u002Fp>\n      <div class=\"card-bignum\">02<\u002Fdiv>\n    <\u002Farticle>\n    <article class=\"card red\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.6\"><path d=\"M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4\"><\u002Fpath><polyline points=\"16 17 21 12 16 7\"><\u002Fpolyline><line x1=\"21\" y1=\"12\" x2=\"9\" y2=\"12\"><\u002Fline><\u002Fsvg>\n      <span class=\"card-tag\">[ SYTUACJA 03 ]<\u002Fspan>\n      <h3>Wiedza odchodzi razem z ludźmi<\u002Fh3>\n      <p class=\"card-body\">Doświadczony handlowiec odchodzi z firmy. Razem z nim znika wiedza o produktach, specyfikacjach i rozwiązaniach, której nigdzie nie zapisałeś. I której nie odzyskasz.<\u002Fp>\n      <div class=\"card-bignum\">03<\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW -->\n<section id=\"how\" class=\"std fade-in\" data-screen-label=\"03 How\">\n  <div class=\"section-header\">\n    <span class=\"tag section-tag\">[ Rozwiązanie ]<\u002Fspan>\n    <h2 style=\"font-size:clamp(32px,4.4vw,56px);margin-bottom:16px;\">JAK TO DZIAŁA<\u002Fh2>\n    <p class=\"section-sub\" style=\"margin-top:0;\">Cztery kroki. Żadnych integracji do konfigurowania. Żadnych miesięcy wdrożenia. Pierwsze wyniki w ciągu jednego dnia.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"cards-4\">\n    <article class=\"card\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10B981\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.7\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"><\u002Fpath><polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline><\u002Fsvg>\n      <span class=\"card-tag green\"><span class=\"led\"><\u002Fspan>01 // WGRYWASZ<\u002Fspan>\n      <h3>Dajesz dokumenty<\u002Fh3>\n      <p class=\"card-body\">PDFy od producentów, cenniki, warunki handlowe, notatki ze szkoleń, instrukcje serwisowe. Cokolwiek masz w firmie — Compilore to czyta i rozumie.<\u002Fp>\n      <div class=\"card-bignum\">01<\u002Fdiv>\n    <\u002Farticle>\n    <article class=\"card\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10B981\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.7\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12\"><\u002Fpath><\u002Fsvg>\n      <span class=\"card-tag green\"><span class=\"led\"><\u002Fspan>02 // KOMPILUJE<\u002Fspan>\n      <h3>AI buduje bazę wiedzy<\u002Fh3>\n      <p class=\"card-body\">Najnowsze modele językowe analizują każdy dokument i budują spójną, połączoną bazę wiedzy. Nie kolejny folder — żywy, inteligentny system, który rośnie z każdym nowym dokumentem i uczy się Twojej firmy.<\u002Fp>\n      <div class=\"card-bignum\">02<\u002Fdiv>\n    <\u002Farticle>\n    <article class=\"card\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10B981\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.7\"><path d=\"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z\"><\u002Fpath><\u002Fsvg>\n      <span class=\"card-tag green\"><span class=\"led\"><\u002Fspan>03 // PYTASZ<\u002Fspan>\n      <h3>Zadajesz pytanie<\u002Fh3>\n      <p class=\"card-body\">Piszesz jak do człowieka — po polsku. „Jaki jest maksymalny pobór prądu pompy X?\" „Czym różni się model A od B?\" „Jakie są warunki gwarancji producenta Y?\" System rozumie kontekst.<\u002Fp>\n      <div class=\"card-bignum\">03<\u002Fdiv>\n    <\u002Farticle>\n    <article class=\"card\">\n      <div class=\"accent-line\"><\u002Fdiv>\n      <svg class=\"card-icon\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#10B981\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"opacity:0.7\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"><\u002Fline><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"><\u002Fline><polyline points=\"10 9 9 9 8 9\"><\u002Fpolyline><\u002Fsvg>\n      <span class=\"card-tag green\"><span class=\"led\"><\u002Fspan>04 // ODPOWIEDŹ<\u002Fspan>\n      <h3>Dostajesz odpowiedź ze źródłem<\u002Fh3>\n      <p class=\"card-body\">Precyzyjna odpowiedź pojawia się w kilkanaście sekund. Zawsze z dokładnym wskazaniem dokumentu, z którego pochodzi. Bez źródła — brak odpowiedzi. To nie jest chatbot. To system wiedzy.<\u002Fp>\n      <div class=\"card-bignum\">04<\u002Fdiv>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DIFFERENCE -->\n<section id=\"difference\" class=\"std alt fade-in\" data-screen-label=\"04 Difference\">\n  <div class=\"section-header\">\n    <span class=\"tag section-tag\">[ Różnica ]<\u002Fspan>\n    <h2 style=\"font-size:clamp(32px,4.4vw,56px);max-width:700px;margin-bottom:16px;\">NIE KOLEJNA<br>WYSZUKIWARKA.<\u002Fh2>\n    <p class=\"section-sub\" style=\"margin-top:0;\">Wyszukiwarka szuka. Compilore wie. To fundamentalna różnica — i widać ją w każdej minucie pracy.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"compare\">\n    <div class=\"compare-col left\">\n      <div class=\"compare-head\">DZIŚ — SZUKASZ SAM<\u002Fdiv>\n      <div class=\"compare-row\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><line x1=\"12\" y1=\"2\" x2=\"2\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><span>Przekopujesz 5 folderów i nie wiesz czy to co znajdziesz jest aktualne<\u002Fspan><\u002Fdiv>\n      <div class=\"compare-row\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><line x1=\"12\" y1=\"2\" x2=\"2\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><span>Nie wiesz czy informacja jest aktualna — dokument mógł się zmienić miesiąc temu<\u002Fspan><\u002Fdiv>\n      <div class=\"compare-row\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><line x1=\"12\" y1=\"2\" x2=\"2\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><span>Nowy pracownik startuje od zera przez miesiące, obciążając senior zespół<\u002Fspan><\u002Fdiv>\n      <div class=\"compare-row\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><line x1=\"12\" y1=\"2\" x2=\"2\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stroke-linecap=\"round\" opacity=\"0.5\"><\u002Fline><\u002Fsvg><span>Wiedza jest w głowach ludzi — i odchodzi razem z nimi bez ostrzeżenia<\u002Fspan><\u002Fdiv>\n      <div class=\"compare-row\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" style=\"flex-shrink:0;margin-top:2px\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\" stroke=\"#EF4444\" stroke-width=\"1.5\" stro an class=\"card-tag green\">[ Zarządzanie wiedzą ]<\u002Fspan>\n      <h3>Drugi mózg dla firmy — jak zorganizować wiedzę produktową<\u002Fh3>\n      <p class=\"blog-card-body\">Praktyczny przewodnik dla dystrybutorów technicznych z szerokim portfolio produktowym.<\u002Fp>\n      <span class=\"blog-link\">Wkrótce →<\u002Fspan>\n    <\u002Farticle>\n    <article class=\"blog-card\">\n      <span class=\"card-tag green\">[ B2B Polska ]<\u002Fspan>\n      <h3>Dlaczego handlowcy tracą 18 minut na każde wyszukiwanie<\u002Fh3>\n      <p class=\"blog-card-body\">Badanie kosztów ukrytych w polskich firmach dystrybucyjnych i jak je wyeliminować.<\u002Fp>\n      <span class=\"blog-link\">Wkrótce →<\u002Fspan>\n    <\u002Farticle>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"footer-upper\">\n    <div>\n      <span class=\"foot-brand\">COMPILORE<\u002Fspan>\n      <p class=\"foot-tag\">AI-powered baza wiedzy dla polskich firm B2B.<br>Zarządzanie wiedzą. Wdrożenie AI. Natychmiastowy ROI.<\u002Fp>\n      <a href=\"mailto:bartek@headframe.pl\" class=\"foot-email\">bartek@headframe.pl<\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <span class=\"foot-col-label\">NAWIGACJA<\u002Fspan>\n      <a href=\"#problem\" class=\"foot-link\">Problem<\u002Fa>\n      <a href=\"#how\" class=\"foot-link\">Jak działa<\u002Fa>\n      <a href=\"#forwhom\" class=\"foot-link\">Dla kogo<\u002Fa>\n      <a href=\"#waitlist\" class=\"foot-link\">Dołącz do pilotu<\u002Fa>\n      <a href=\"#blog\" class=\"foot-link\">Baza wiedzy<\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <span class=\"foot-col-label\">INFORMACJE<\u002Fspan>\n      <a href=\"#privacy\" class=\"foot-link\" id=\"privacy-trigger\">Polityka prywatności<\u002Fa>\n      <a href=\"https://app.compilore.pl\" class=\"foot-link\">Zaloguj się ↗<\u002Fa>\n      <span class=\"foot-static\">Serwery EU · Hetzner DE<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-lower\">\n    <span class=\"foot-meta\">© 2026 HEADFRAME SP. Z O.O. · NIP: 8971969073 · KRS: 0001227801<\u002Fspan>\n    <span class=\"foot-meta dim\">STANISŁAWA LESZCZYŃSKIEGO 4/77 · 50-078 WROCŁAW<\u002Fspan>\n    <span class=\"foot-meta\">COMPILORE.PL · SERWERY EU · RODO<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- PRIVACY MODAL -->\n<div class=\"modal-overlay\" id=\"privacy-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"privacy-title\">\n  <div class=\"modal\">\n    <button class=\"modal-close\" id=\"privacy-close\" aria-label=\"Zamknij\">×<\u002Fbutton>\n    <div id=\"privacy-policy-content\">\n      <h2 id=\"privacy-title\">Polityka prywatności<\u002Fh2>\n\n      <h3>Administrator danych<\u002Fh3>\n      <p>HEADFRAME SPÓŁKA Z OGRANICZONĄ ODPOWIEDZIALNOŚCIĄ<br>NIP: 8971969073 · KRS: 0001227801<br>Stanisława Leszczyńskiego 4/77, 50-078 Wrocław, Polska<\u002Fp>\n\n      <h3>Kontakt<\u002Fh3>\n      <p>W sprawach związanych z przetwarzaniem danych osobowych: <a href=\"mailto:bartek@headframe.pl\" style=\"color:#10B981;text-decoration:none\">bartek@headframe.pl<\u002Fa><\u002Fp>\n\n      <h3>Cel przetwarzania<\u002Fh3>\n      <p>Dane podane w formularzu kontaktowym są przetwarzane wyłącznie w celu obsługi zgłoszenia, kontaktu w sprawie pilotu programu Compilore oraz prowadzenia korespondencji handlowej.<\u002Fp>\n\n      <h3>Podstawa prawna<\u002Fh3>\n      <p>Art. 6 ust. 1 lit. a RODO — zgoda osoby, której dane dotyczą, wyrażona poprzez przesłanie formularza.<\u002Fp>\n\n      <h3>Okres przechowywania<\u002Fh3>\n      <p>Dane są przechowywane do czasu cofnięcia zgody przez użytkownika lub zakończenia współpracy. Po tym okresie dane są niezwłocznie usuwane.<\u002Fp>\n\n      <h3>Prawa użytkownika<\u002Fh3>\n      <ul>\n        <li>Prawo dostępu do swoich danych<\u002Fli>\n        <li>Prawo do sprostowania danych<\u002Fli>\n        <li>Prawo do usunięcia danych („prawo do bycia zapomnianym\")<\u002Fli>\n        <li>Prawo do przenoszenia danych<\u002Fli>\n        <li>Prawo do wniesienia skargi do Prezesa Urzędu Ochrony Danych Osobowych<\u002Fli>\n      <\u002Ful>\n\n      <h3>Lokalizacja serwerów<\u002Fh3>\n      <p>Dane są przechowywane wyłącznie na serwerach zlokalizowanych na terenie Unii Europejskiej (Hetzner, Niemcy). Dane nie są przekazywane do państw trzecich.<\u002Fp>\n\n      <h3>Profilowanie automatyczne<\u002Fh3>\n      <p>Compilore nie podejmuje decyzji opartych wyłącznie o zautomatyzowane przetwarzanie danych, w tym profilowanie, które wywoływałoby skutki prawne wobec użytkownika.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ===== Interactive grid canvas =====\n(function(){\n  const canvas = document.getElementById('bgCanvas');\n  if(!canvas) return;\n  const ctx = canvas.getContext('2d');\n  const CELL = 36;\n  const GREEN = '16,185,129';\n  let mx = -9999, my = -9999;\n  function resize(){\n    canvas.width = window.innerWidth;\n    canvas.height = window.innerHeight;\n  }\n  resize();\n  window.addEventListener('resize', resize);\n  window.addEventListener('mousemove', function(e){\n    mx = e.clientX;\n    my = e.clientY;\n  });\n  function draw(){\n    ctx.clearRect(0,0,canvas.width,canvas.height);\n    const cols = Math.ceil(canvas.width/CELL)+1;\n    const rows = Math.ceil(canvas.height/CELL)+1;\n    for(let r=0;r<=rows;r++){\n      for(let c=0;c<=cols;c++){\n        const x=c*CELL, y=r*CELL;\n        const dist=Math.hypot(x-mx,y-my);\n        const MAX=180;\n        if(dist<MAX){\n          const t=1-dist/MAX;\n          ctx.beginPath();\n          ctx.arc(x,y,1.5+t*1.5,0,Math.PI*2);\n          ctx.fillStyle='rgba('+GREEN+','+(0.08+t*0.35)+')';\n          ctx.fill();\n          if(t>0.3){\n            ctx.strokeStyle='rgba('+GREEN+','+(t*0.08)+')';\n            ctx.lineWidth=0.5;\n            ctx.strokeRect(x,y,CELL,CELL);\n          }\n        } else {\n          ctx.beginPath();\n          ctx.arc(x,y,0.5,0,Math.PI*2);\n          ctx.fillStyle='rgba(255,255,255,0.035)';\n          ctx.fill();\n        }\n      }\n    }\n    requestAnimationFrame(draw);\n  }\n  draw();\n})();\n\n// ===== C6: CSS Spotlight =====\n(function(){\n  var root = document.documentElement;\n  window.addEventListener('mousemove', function(e){\n    root.style.setProperty('--spotlight-x', e.clientX + 'px');\n    root.style.setProperty('--spotlight-y', e.clientY + 'px');\n  }, {passive:true});\n})();\n\n// ===== AI compare observer =====\n(function(){\n  const comp = document.querySelector('.ai-compare');\n  if(!comp) return;\n  const obs = new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if(e.isIntersecting){comp.classList.add('visible');obs.disconnect();}\n    });\n  },{threshold:0.3});\n  obs.observe(comp);\n})();\n\n// ===== Nav scroll background =====\nconst nav = document.getElementById('nav');\nfunction onScroll(){\n  if(window.scrollY > 64) nav.classList.add('scrolled');\n  else nav.classList.remove('scrolled');\n}\nwindow.addEventListener('scroll', onScroll, {passive:true});\nonScroll();\n\n// ===== Active section observer =====\nconst sections = document.querySelectorAll('section[id]');\nconst navLinks = document.querySelectorAll('.nav-link');\nconst depthLinks = document.querySelectorAll('.depth a');\n\nconst activeObs = new IntersectionObserver((entries)=>{\n  entries.forEach(entry=>{\n    if(entry.isIntersecting){\n      const id = entry.target.id;\n      navLinks.forEach(l=>l.classList.toggle('active', l.dataset.section === id));\n      depthLinks.forEach(l=>l.classList.toggle('active', l.dataset.section === id));\n    }\n  });\n}, {threshold:0.4});\nsections.forEach(s=>activeObs.observe(s));\n\n// ===== Fade-in =====\nconst fadeObs = new IntersectionObserver((entries)=>{\n  entries.forEach(entry=>{\n    if(entry.isIntersecting){\n      entry.target.classList.add('visible');\n      fadeObs.unobserve(entry.target);\n    }\n  });\n}, {threshold:0.15});\ndocument.querySelectorAll('.fade-in').forEach(el=>fadeObs.observe(el));\n// Hero visible immediately\ndocument.getElementById('hero').classList.add('visible');\n\n// ===== Metrics count-up =====\nfunction easeOutCubic(t){return 1 - Math.pow(1 - t, 3);}\nfunction animateNumber(el){\n  const target = parseFloat(el.dataset.target);\n  const suffix = el.dataset.suffix || '';\n  const duration = 1500;\n  const start = performance.now();\n  function tick(now){\n    const elapsed = now - start;\n    const t = Math.min(elapsed / duration, 1);\n    const eased = easeOutCubic(t);\n    const value = Math.round(target * eased);\n    el.textContent = value + suffix;\n    if(t < 1) requestAnimationFrame(tick);\n    else el.textContent = target + suffix;\n  }\n  requestAnimationFrame(tick);\n}\nconst metricObs = new IntersectionObserver((entries)=>{\n  entries.forEach(entry=>{\n    if(entry.isIntersecting){\n      entry.target.querySelectorAll('.metric-num').forEach(animateNumber);\n      metricObs.unobserve(entry.target);\n    }\n  });\n}, {threshold:0.5});\nconst metricsEl = document.getElementById('metrics');\nif(metricsEl) metricObs.observe(metricsEl);\n\n// ===== Form submit =====\nconst form = document.getElementById('pilot-form');\nconst formContainer = document.getElementById('form-container');\nform.addEventListener('submit', (e)=>{\n  e.preventDefault();\n  formContainer.innerHTML = `\n    <div class=\"form-success\">\n      <h3>Zgłoszenie przyjęte.<\u002Fh3>\n      <p>Odezwiemy się w ciągu 24 godzin na podany adres email.<\u002Fp>\n    <\u002Fdiv>\n  `;\n});\n\n// ===== Privacy modal =====\nconst privacyTrigger = document.getElementById('privacy-trigger');\nconst privacyModal = document.getElementById('privacy-modal');\nconst privacyClose = document.getElementById('privacy-close');\nprivacyTrigger.addEventListener('click', (e)=>{\n  e.preventDefault();\n  privacyModal.classList.add('open');\n  document.body.style.overflow='hidden';\n});\nfunction closePrivacy(){\n  privacyModal.classList.remove('open');\n  document.body.style.overflow='';\n}\nprivacyClose.addEventListener('click', closePrivacy);\nprivacyModal.addEventListener('click', (e)=>{\n  if(e.target === privacyModal) closePrivacy();\n});\ndocument.addEventListener('keydown',(e)=>{\n  if(e.key==='Escape' && privacyModal.classList.contains('open')) closePrivacy();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
